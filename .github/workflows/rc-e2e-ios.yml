name: RC E2E — iOS (reusable)

on:
  workflow_call:
    inputs:
      plugin_version:
        description: RC plugin version (e.g. 6.18.0-rc1)
        required: true
        type: string
      release_branch:
        description: Release branch to check out
        required: true
        type: string
    secrets:
      UNITY_EMAIL:
        required: true
      UNITY_PASSWORD:
        required: true
      UNITY_SERIAL:
        required: true
      ENV_FILE:
        required: true

jobs:
  # Job 1: Build Unity iOS Xcode project on Linux (game-ci Docker requires Linux)
  build-ios-xcode:
    name: Build iOS Xcode project — ${{ inputs.plugin_version }}
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout release branch
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.release_branch }}

      - name: Write .env from secret
        run: |
          printf '%s' "${{ secrets.ENV_FILE }}" > test-app/Assets/StreamingAssets/.env

      - name: Activate Unity license
        uses: game-ci/unity-activate@v2
        env:
          UNITY_EMAIL:    ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
          UNITY_SERIAL:   ${{ secrets.UNITY_SERIAL }}

      - name: Build iOS Xcode project (via Unity)
        uses: game-ci/unity-builder@v4
        env:
          UNITY_EMAIL:    ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
          UNITY_SERIAL:   ${{ secrets.UNITY_SERIAL }}
        with:
          projectPath:     test-app
          unityVersion:    6000.3.5f1
          targetPlatform:  iOS
          buildName:       UnityQATest
          buildsPath:      test-app/Build
          buildMethod:     BuildScript.BuildIOSSimulator
          allowDirtyBuild: true

      - name: Upload Xcode project as artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-xcode-project-${{ inputs.plugin_version }}
          path: test-app/Build/iOS-Simulator/
          retention-days: 1

      - name: Return Unity license
        if: always()
        uses: game-ci/unity-return-license@v2

  # Job 2: Pod install, compile .app, and run E2E on macOS
  e2e-ios:
    name: E2E iOS — ${{ inputs.plugin_version }}
    runs-on: macos-14
    needs: build-ios-xcode
    timeout-minutes: 60

    steps:
      - name: Checkout release branch
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.release_branch }}

      - name: Write .env from secret
        run: |
          printf '%s' "${{ secrets.ENV_FILE }}" > test-app/Assets/StreamingAssets/.env

      - name: Install jq
        run: brew install jq 2>/dev/null || true

      - name: Download Xcode project artifact
        uses: actions/download-artifact@v4
        with:
          name: ios-xcode-project-${{ inputs.plugin_version }}
          path: test-app/Build/iOS-Simulator/

      - name: Install iOS pods
        run: |
          chmod +x scripts/ios-pod-install.sh
          scripts/ios-pod-install.sh test-app/Build/iOS-Simulator

      - name: Compile simulator .app from Xcode workspace
        run: |
          set -o pipefail
          XCODE_WS=test-app/Build/iOS-Simulator/Unity-iPhone.xcworkspace
          xcodebuild \
            -workspace "$XCODE_WS" \
            -scheme    Unity-iPhone \
            -sdk       iphonesimulator \
            -configuration Debug \
            -derivedDataPath test-app/Build/iOS-Simulator/DerivedData \
            ARCHS=x86_64 \
            VALID_ARCHS=x86_64 \
            CURRENT_PROJECT_VERSION=1 \
            MARKETING_VERSION=1.0 \
            OTHER_LDFLAGS="-allow_missing_module_imported_lib" \
            build | xcpretty

          APP=$(find test-app/Build/iOS-Simulator/DerivedData -name "UnityQATest.app" -maxdepth 6 | head -1)
          if [[ -z "$APP" ]]; then
            echo "::error::UnityQATest.app not found after xcodebuild"
            exit 1
          fi
          rm -rf test-app/Build/iOS-Simulator/UnityQATest.app
          cp -R "$APP" test-app/Build/iOS-Simulator/UnityQATest.app

      - name: Boot iOS simulator
        run: |
          UDID=$(xcrun simctl list devices available -j | \
            jq -r '.devices | to_entries[] | select(.key | contains("iOS-17")) | .value[] | select(.isAvailable == true) | .udid' | head -1)
          if [[ -z "$UDID" ]]; then
            UDID=$(xcrun simctl list devices available -j | \
              jq -r '.devices[][] | select(.isAvailable == true) | .udid' | head -1)
          fi
          echo "Booting simulator: $UDID"
          xcrun simctl boot "$UDID" || true
          xcrun simctl bootstatus "$UDID" -b
          echo "SIM_UDID=$UDID" >> "$GITHUB_ENV"

      - name: Run E2E scenario runner — iOS
        run: |
          chmod +x scripts/af-scenario-runner.sh
          scripts/af-scenario-runner.sh \
            --platform ios \
            --plan     .af-e2e/test-plan.json \
            --verbose

      - name: Upload E2E report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-ios-report-${{ inputs.plugin_version }}
          path: .af-e2e/reports/
          retention-days: 30
