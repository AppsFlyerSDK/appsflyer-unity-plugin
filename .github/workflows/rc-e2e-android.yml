name: RC E2E — Android (reusable)

on:
  workflow_call:
    inputs:
      plugin_version:
        description: RC plugin version (e.g. 6.18.0-rc1)
        required: true
        type: string
      release_branch:
        description: Release branch to check out
        required: true
        type: string
      package_artifact_name:
        description: Workflow artifact containing generated Unity packages
        required: true
        type: string
      package_file_name:
        description: Regular .unitypackage file name inside the artifact
        required: true
        type: string
      plan_path:
        description: Scenario plan to run
        required: false
        default: .af-e2e/test-plan.json
        type: string
      report_artifact_prefix:
        description: Prefix for uploaded report artifacts
        required: false
        default: e2e
        type: string
    secrets:
      UNITY_EMAIL:
        required: true
      UNITY_PASSWORD:
        required: true
      UNITY_SERIAL:
        required: true
      ENV_FILE:
        required: true

jobs:
  e2e-android:
    name: E2E Android — ${{ inputs.plugin_version }}
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: read
      packages: read

    steps:
      - name: Checkout release branch
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.release_branch }}

      - name: Download generated Unity package
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.package_artifact_name }}
          path: .af-artifacts

      - name: Import generated package into test app
        run: |
          python3 scripts/import-unity-package.py \
            --package ".af-artifacts/${{ inputs.package_file_name }}" \
            --project test-app \
            --remove-manifest-dependency appsflyer-unity-plugin \
            --clean Assets/AppsFlyer

      - name: Write .env from secret
        run: |
          printf '%s' "${{ secrets.ENV_FILE }}" > test-app/Assets/StreamingAssets/.env

      - name: Log in to GHCR
        env:
          GH_TOKEN: ${{ github.token }}
        run: echo "$GH_TOKEN" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Build Android APK
        uses: game-ci/unity-builder@v4
        env:
          UNITY_EMAIL:    ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
          UNITY_SERIAL:   ${{ secrets.UNITY_SERIAL }}
        with:
          unityVersion:   6000.3.5f1
          targetPlatform: Android
          customImage:    ghcr.io/appsflyersdk/unity-android:ubuntu-6000.3.5f1-android-3
          projectPath:    test-app
          buildMethod:    BuildScript.BuildAndroid
          buildsPath:     test-app/Build
          allowDirtyBuild: true
        timeout-minutes: 30

      - name: Upload Unity build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unity-build-log-${{ inputs.plugin_version }}
          path: /tmp/unity-build.log
          retention-days: 3

      - name: Locate APK
        run: |
          APK=$(find test-app/Build -name "*.apk" | head -1)
          if [[ -z "$APK" ]]; then
            echo "::error::APK not found after Unity build"
            exit 1
          fi
          echo "APK_PATH=$APK" >> "$GITHUB_ENV"

      - name: Install jq
        run: sudo apt-get install -y jq

      - name: Enable KVM for hardware-accelerated emulator
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Pin AppsFlyer-host DNS resolution
        run: |
          for host in oyoxfj.conversions.appsflyersdk.com t.appsflyer.com conversions.appsflyer.com; do
            echo "--- nslookup $host ---"
            nslookup "$host" 8.8.8.8 || true
          done

      - name: Run E2E scenario runner inside Android emulator
        uses: reactivecircus/android-emulator-runner@v2
        env:
          AF_QA_POST_MARKER_WAIT_SEC: "30"
        with:
          api-level: 33
          arch: x86_64
          target: google_apis
          profile: pixel_6
          cores: 4
          ram-size: 4096M
          emulator-options: -dns-server 8.8.8.8,1.1.1.1 -no-window -no-snapshot -no-boot-anim -gpu swiftshader_indirect -accel on
          disable-animations: true
          script: |
            adb wait-for-device
            adb install -r "$APK_PATH"
            adb shell am force-stop com.appsflyer.engagement
            chmod +x scripts/af-scenario-runner.sh
            scripts/af-scenario-runner.sh --platform android --plan "${{ inputs.plan_path }}" --verbose

      - name: Upload E2E report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.report_artifact_prefix }}-android-report-${{ inputs.plugin_version }}
          path: |
            .af-e2e/reports/
            .af-smoke/reports/
          include-hidden-files: true
          retention-days: 30
