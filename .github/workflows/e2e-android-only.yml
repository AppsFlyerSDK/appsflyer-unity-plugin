name: E2E — Android only

on:
  push:
    branches:
      - plugins-effort-reduction-workflow1
  workflow_dispatch:

jobs:
  e2e-android:
    uses: ./.github/workflows/rc-e2e-android.yml
    with:
      plugin_version: ${{ github.event.inputs.plugin_version || 'push-trigger' }}
      release_branch: ${{ github.ref_name }}
    secrets: inherit
