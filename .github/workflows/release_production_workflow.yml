name: plugin release to Production workflow

on:
  workflow_dispatch:
    inputs:
      plugin_version:
        description: "Manual recovery only; normal releases infer this automatically. Production version, e.g. 6.18.0"
        required: true
        type: string
      release_branch_name:
        description: "Manual recovery only; use when the automatic production trigger was missed. Promoted branch, e.g. releases/6.x.x/6.18.x/6.18.0-rc3"
        required: true
        type: string
  pull_request:
    types:
      - closed
    branches:
      - 'master'

jobs:
  Prepare-Release:
    if: >
      github.event_name == 'workflow_dispatch' ||
      (
      github.event_name == 'pull_request' &&
      github.event.pull_request.merged == true &&
      github.event.pull_request.base.ref == 'master' &&
      startsWith(github.event.pull_request.head.ref, 'releases/')
      )
    runs-on: ubuntu-latest
    outputs:
      output1: ${{ steps.tag-step.outputs.PLUGIN_VERSION}}
      output2: ${{ steps.tag-step.outputs.RELEASE_BRANCH_NAME}}
    steps:
      - uses: actions/checkout@v4
      - name: Login to GitHub
        env:
          COMMIT_AUTHOR: ${{ secrets.CI_USERNAME}}
          COMMIT_EMAIL: ${{ secrets.CI_EMAIL}}
        run: |
          git config --global user.name "$COMMIT_AUTHOR"
          git config --global user.email "$COMMIT_EMAIL"

      - name: Determine release tag and release branch
        id: tag-step
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_HEAD_REF: ${{ github.event.pull_request.head.ref }}
          DISPATCH_PLUGIN_VERSION: ${{ inputs.plugin_version }}
          DISPATCH_RELEASE_BRANCH_NAME: ${{ inputs.release_branch_name }}
        run: |
          set -euo pipefail

          if [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            TAG="$DISPATCH_PLUGIN_VERSION"
            RELEASE_BRANCH_NAME="$DISPATCH_RELEASE_BRANCH_NAME"
          else
            RELEASE_BRANCH_NAME="$PR_HEAD_REF"
            TAG=$(printf '%s\n' "$RELEASE_BRANCH_NAME" | grep -Eo '[0-9]+\.[0-9]+\.[0-9]+' | tail -1)
          fi

          if ! [[ "$TAG" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::plugin_version must match X.Y.Z, for example 6.18.0"
            exit 1
          fi

          if ! [[ "$RELEASE_BRANCH_NAME" =~ ^releases/[0-9]+\.x\.x/[0-9]+\.[0-9]+\.x/[0-9]+\.[0-9]+\.[0-9]+-rc[0-9]+$ ]]; then
            echo "::error::release_branch_name must look like releases/6.x.x/6.18.x/6.18.0-rc3"
            exit 1
          fi

          BRANCH_RC_VERSION=$(printf '%s\n' "$RELEASE_BRANCH_NAME" | grep -Eo '[0-9]+\.[0-9]+\.[0-9]+-rc[0-9]+' | tail -1)
          BRANCH_BASE_VERSION="${BRANCH_RC_VERSION%-rc*}"
          if [[ "$BRANCH_BASE_VERSION" != "$TAG" ]]; then
            echo "::error::plugin_version $TAG does not match release branch base version $BRANCH_BASE_VERSION"
            exit 1
          fi

          echo "PLUGIN_VERSION=$TAG" >> "$GITHUB_ENV"
          echo "PLUGIN_VERSION=$TAG" >> "$GITHUB_OUTPUT"
          echo "RELEASE_BRANCH_NAME=$RELEASE_BRANCH_NAME" >> "$GITHUB_ENV"
          echo "RELEASE_BRANCH_NAME=$RELEASE_BRANCH_NAME" >> "$GITHUB_OUTPUT"

  Build-Production-Packages:
    needs: [Prepare-Release]
    runs-on: macos-14
    outputs:
      artifact_name: ${{ steps.artifact.outputs.name }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: master

      - name: Set artifact name
        id: artifact
        run: |
          echo "name=production-unity-packages-${{ needs.Prepare-Release.outputs.output1 }}" >> "$GITHUB_OUTPUT"

      - name: Cache Unity Editor installation
        id: cache-unity
        uses: actions/cache@v4
        with:
          path: /Applications/Unity/Unity.app
          key: unity-6000.3.5f1-core-macos14-arm64

      - name: Install Unity Editor
        if: steps.cache-unity.outputs.cache-hit != 'true'
        run: |
          curl -fL "https://download.unity3d.com/download_unity/a1ec4b2f2d19/MacEditorInstallerArm64/Unity-6000.3.5f1.pkg" \
            -o /tmp/Unity.pkg
          sudo installer -pkg /tmp/Unity.pkg -target /
          UNITY=$(find /Applications -name "Unity" -type f -path "*/MacOS/Unity" 2>/dev/null | head -1)
          echo "UNITY_PATH=$UNITY" >> "$GITHUB_ENV"
        timeout-minutes: 45

      - name: Activate Unity license
        run: |
          UNITY="${UNITY_PATH:-/Applications/Unity/Unity.app/Contents/MacOS/Unity}"
          "$UNITY" -quit -batchmode \
            -serial "${{ secrets.UNITY_SERIAL }}" \
            -username "${{ secrets.UNITY_EMAIL }}" \
            -password "${{ secrets.UNITY_PASSWORD }}" \
            -logFile /tmp/unity-activate.log 2>&1 || true
          grep -E "LICENSE|license|error|Error" /tmp/unity-activate.log || true

      - name: Build production Unity packages
        run: |
          scripts/build-release-packages.sh \
            --version "${{ needs.Prepare-Release.outputs.output1 }}" \
            --output-dir dist/unitypackages
        timeout-minutes: 45

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install package validation dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install unitypackage_extractor

      - name: Validate production package metadata
        run: |
          python .github/workflows/Scripts/validate-production-package.py \
            --version "${{ needs.Prepare-Release.outputs.output1 }}" \
            --regular "dist/unitypackages/appsflyer-unity-plugin-${{ needs.Prepare-Release.outputs.output1 }}.unitypackage" \
            --strict "dist/unitypackages/strict-mode-sdk/appsflyer-unity-plugin-strict-mode-${{ needs.Prepare-Release.outputs.output1 }}.unitypackage"

      - name: Return Unity license
        if: always()
        run: |
          UNITY="${UNITY_PATH:-/Applications/Unity/Unity.app/Contents/MacOS/Unity}"
          "$UNITY" -quit -batchmode -returnlicense \
            -username "${{ secrets.UNITY_EMAIL }}" \
            -password "${{ secrets.UNITY_PASSWORD }}" \
            -logFile /tmp/unity-return.log 2>&1 || true
          cat /tmp/unity-return.log || true

      - name: Upload production package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.artifact.outputs.name }}
          path: dist/unitypackages/
          retention-days: 30

      - name: Upload production package build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: production-unity-package-build-logs-${{ needs.Prepare-Release.outputs.output1 }}
          path: |
            deploy/create_unity_core.log
            deploy/create_unity_strict.log
            /tmp/unity-activate.log
            /tmp/unity-return.log
          retention-days: 7

  Check-Packages:
    needs: [Prepare-Release, Build-Production-Packages]
    uses: ./.github/workflows/check_packages.yml
    with:
      plugin_version: ${{ needs.Prepare-Release.outputs.output1 }}
      package_artifact_name: ${{ needs.Build-Production-Packages.outputs.artifact_name }}
    secrets: inherit

  Update-Links:
    needs: [Prepare-Release, Check-Packages]
    uses: ./.github/workflows/update_links.yml
    with:
      plugin_version: ${{ needs.Prepare-Release.outputs.output1 }}
    secrets: inherit

  Generate-Tag:
    needs: [Prepare-Release, Check-Packages, Update-Links]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create a version tag and push it
        run: |
          echo "Pushing release tag: ${{ needs.Prepare-Release.outputs.output1 }}!"
          git checkout master
          echo "Checked out to master"
          git pull origin master
          git tag "${{ needs.Prepare-Release.outputs.output1 }}"
          echo "Created release tag"
          git push origin "${{needs.Prepare-Release.outputs.output1}}"
          echo "Pushed release tag ${{ needs.Prepare-Release.outputs.output1 }}"

  Release-To-Production:
    needs: [Prepare-Release, Build-Production-Packages, Check-Packages, Update-Links, Generate-Tag]
    uses: ./.github/workflows/release_to_production.yml
    with:
      plugin_version: ${{ needs.Prepare-Release.outputs.output1 }}
      branch_name: ${{ needs.Prepare-Release.outputs.output2 }}
      package_artifact_name: ${{ needs.Build-Production-Packages.outputs.artifact_name }}
    secrets: inherit

  notify-team:
    name: Notify Slack
    needs:
      - Prepare-Release
      - Build-Production-Packages
      - Check-Packages
      - Update-Links
      - Generate-Tag
      - Release-To-Production
    if: always() && needs.Prepare-Release.result != 'skipped'
    runs-on: ubuntu-latest
    steps:
      - name: Determine status and failed stage
        id: status
        env:
          PREPARE_RESULT: ${{ needs.Prepare-Release.result }}
          BUILD_RESULT: ${{ needs.Build-Production-Packages.result }}
          PACKAGES_RESULT: ${{ needs.Check-Packages.result }}
          LINKS_RESULT: ${{ needs.Update-Links.result }}
          TAG_RESULT: ${{ needs.Generate-Tag.result }}
          RELEASE_RESULT: ${{ needs.Release-To-Production.result }}
        run: |
          set -euo pipefail
          if [[ "$PREPARE_RESULT" == "success" \
             && "$BUILD_RESULT" == "success" \
             && "$PACKAGES_RESULT" == "success" \
             && "$LINKS_RESULT" == "success" \
             && "$TAG_RESULT" == "success" \
             && "$RELEASE_RESULT" == "success" ]]; then
            echo "success=true" >> "$GITHUB_OUTPUT"
            echo "failed_stage=" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "success=false" >> "$GITHUB_OUTPUT"
          if   [[ "$PREPARE_RESULT" != "success" ]]; then echo "failed_stage=Prepare-Release" >> "$GITHUB_OUTPUT"
          elif [[ "$BUILD_RESULT" != "success" ]]; then echo "failed_stage=Build-Production-Packages" >> "$GITHUB_OUTPUT"
          elif [[ "$PACKAGES_RESULT" != "success" ]]; then echo "failed_stage=Check-Packages" >> "$GITHUB_OUTPUT"
          elif [[ "$LINKS_RESULT" != "success" ]]; then echo "failed_stage=Update-Links" >> "$GITHUB_OUTPUT"
          elif [[ "$TAG_RESULT" != "success" ]]; then echo "failed_stage=Generate-Tag" >> "$GITHUB_OUTPUT"
          else echo "failed_stage=Release-To-Production" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout master
        if: steps.status.outputs.success == 'true'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: master

      - name: Extract changelog snippet
        id: changelog
        if: steps.status.outputs.success == 'true'
        continue-on-error: true
        env:
          PLUGIN_VERSION: ${{ needs.Prepare-Release.outputs.output1 }}
        run: |
          chmod +x .github/workflows/Scripts/extract-changelog-snippet.sh
          .github/workflows/Scripts/extract-changelog-snippet.sh

      - name: Read native SDK and Purchase Connector versions from README
        id: sdk-versions
        if: steps.status.outputs.success == 'true'
        continue-on-error: true
        run: |
          IOS=$(grep -Eo 'iOS AppsFlyer SDK v[0-9]+\.[0-9]+\.[0-9]+' README.md | head -1 | sed 's/iOS AppsFlyer SDK v//')
          ANDROID=$(grep -Eo 'Android AppsFlyer SDK v[0-9]+\.[0-9]+\.[0-9]+' README.md | head -1 | sed 's/Android AppsFlyer SDK v//')
          ANDROID_PC=$(grep -Eo 'Android Purchase Connector [0-9]+\.[0-9]+\.[0-9]+' README.md | head -1 | sed 's/Android Purchase Connector //')
          IOS_PC=$(grep -Eo 'iOS Purchase Connector [0-9]+\.[0-9]+\.[0-9]+' README.md | head -1 | sed 's/iOS Purchase Connector //')
          if [[ -n "$IOS" && -n "$IOS_PC" && "$IOS" != "$IOS_PC" ]]; then
            echo "::error::README iOS Purchase Connector ($IOS_PC) must match iOS AppsFlyer SDK ($IOS)"
            exit 1
          fi
          {
            echo "ios_sdk=${IOS:-unknown}"
            echo "android_sdk=${ANDROID:-unknown}"
            echo "android_pc=${ANDROID_PC:-unknown}"
            echo "ios_pc=${IOS:-unknown}"
          } >> "$GITHUB_OUTPUT"

      - name: Fetch Jira tickets
        id: jira-tickets
        if: steps.status.outputs.success == 'true'
        continue-on-error: true
        env:
          JIRA_EMAIL: ${{ secrets.CI_JIRA_EMAIL }}
          JIRA_TOKEN: ${{ secrets.CI_JIRA_TOKEN }}
          JIRA_DOMAIN: ${{ secrets.CI_JIRA_DOMAIN }}
          # Promoted releases use stripped semver in Jira (Unity SDK v6.18.0).
          JIRA_FIX_VERSION: Unity SDK v${{ needs.Prepare-Release.outputs.output1 }}
        run: |
          chmod +x .github/workflows/Scripts/fetch-jira-tickets.sh
          .github/workflows/Scripts/fetch-jira-tickets.sh

      - name: Build Slack success payload
        id: slack-success-payload
        if: steps.status.outputs.success == 'true'
        env:
          PLUGIN_VERSION: ${{ needs.Prepare-Release.outputs.output1 }}
          REPOSITORY: ${{ github.repository }}
          TAG: ${{ needs.Prepare-Release.outputs.output1 }}
          RUN_ID: ${{ github.run_id }}
          CHANGELOG_BODY: ${{ steps.changelog.outputs.body }}
          JIRA_TICKETS: ${{ steps.jira-tickets.outputs.tickets }}
          ANDROID_SDK_VERSION: ${{ steps.sdk-versions.outputs.android_sdk }}
          IOS_SDK_VERSION: ${{ steps.sdk-versions.outputs.ios_sdk }}
          ANDROID_PC_VERSION: ${{ steps.sdk-versions.outputs.android_pc }}
          IOS_PC_VERSION: ${{ steps.sdk-versions.outputs.ios_pc }}
        run: |
          node <<'NODE'
          const fs = require('fs');
          const env = process.env;
          const unityWrap = ':unity:'.repeat(10);
          const body = [
            '<!here>',
            '',
            `*Unity Plugin ${env.PLUGIN_VERSION}* is published to Production.`,
            '',
            ':white_check_mark: rc-smoke/github-release passed before promotion.',
            '',
            '*Installation:*',
            'Download `.unitypackage` assets from the GitHub release, or use UPM branches `upm` / `Strict-upm`.',
            '',
            '*Sources:*',
            `:github: Tree: https://github.com/${env.REPOSITORY}/tree/master`,
            `:github: Release: https://github.com/${env.REPOSITORY}/releases/tag/${env.TAG}`,
            `:github: Run: https://github.com/${env.REPOSITORY}/actions/runs/${env.RUN_ID}`,
            '',
            '*Changes and fixes:*',
            env.CHANGELOG_BODY || '• Check CHANGELOG.md for details',
            '',
            '*Linked tickets and issues:*',
            env.JIRA_TICKETS || 'No assigned fix version found',
            '',
            '*Native SDK versions:*',
            `:android: AppsFlyer SDK ${env.ANDROID_SDK_VERSION}`,
            `:apple_company: AppsFlyer SDK ${env.IOS_SDK_VERSION}`,
            '',
            '*Purchase Connector versions:*',
            `:android: ${env.ANDROID_PC_VERSION}`,
            `:apple_company: ${env.IOS_PC_VERSION}`,
            '',
          ].join('\n');
          const text = `${unityWrap}\n${body}\n${unityWrap}`;
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `payload=${JSON.stringify({ text })}\n`);
          NODE

      - name: Send Slack notification (Success)
        if: steps.status.outputs.success == 'true'
        uses: slackapi/slack-github-action@v1
        continue-on-error: true
        with:
          payload: ${{ steps.slack-success-payload.outputs.payload }}
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.CI_SLACK_WEBHOOK_URL }}

      - name: Build Slack failure payload
        id: slack-failure-payload
        if: steps.status.outputs.success == 'false'
        env:
          FAILED_STAGE: ${{ steps.status.outputs.failed_stage }}
          PLUGIN_VERSION: ${{ needs.Prepare-Release.outputs.output1 || 'unknown' }}
          REPOSITORY: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
          PREPARE_RESULT: ${{ needs.Prepare-Release.result }}
          BUILD_RESULT: ${{ needs.Build-Production-Packages.result }}
          PACKAGES_RESULT: ${{ needs.Check-Packages.result }}
          LINKS_RESULT: ${{ needs.Update-Links.result }}
          TAG_RESULT: ${{ needs.Generate-Tag.result }}
          RELEASE_RESULT: ${{ needs.Release-To-Production.result }}
        run: |
          node <<'NODE'
          const fs = require('fs');
          const env = process.env;
          const text = [
            '<!here>',
            `:warning: *Unity production release failed at \`${env.FAILED_STAGE}\`*`,
            '',
            `Version: ${env.PLUGIN_VERSION}`,
            `Run: https://github.com/${env.REPOSITORY}/actions/runs/${env.RUN_ID}`,
            '',
            '*Stage results:*',
            `• Prepare-Release: ${env.PREPARE_RESULT}`,
            `• Build-Production-Packages: ${env.BUILD_RESULT}`,
            `• Check-Packages: ${env.PACKAGES_RESULT}`,
            `• Update-Links: ${env.LINKS_RESULT}`,
            `• Generate-Tag: ${env.TAG_RESULT}`,
            `• Release-To-Production: ${env.RELEASE_RESULT}`,
          ].join('\n');
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `payload=${JSON.stringify({ text })}\n`);
          NODE

      - name: Send Slack notification (Failure)
        if: steps.status.outputs.success == 'false'
        uses: slackapi/slack-github-action@v1
        continue-on-error: true
        with:
          payload: ${{ steps.slack-failure-payload.outputs.payload }}
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.CI_SLACK_WEBHOOK_URL }}
