name: E2E - Manual trigger

on:
  workflow_dispatch:
    inputs:
      plugin_version:
        description: Version label for the package and report (ignored when release_tag is set)
        required: false
        default: manual-test
        type: string
      release_tag:
        description: "GitHub release tag to test (e.g. v6.18.1). When set, downloads the published .unitypackage instead of building from source."
        required: false
        default: ""
        type: string
      platform:
        description: Platform to test
        required: true
        type: choice
        options:
          - both
          - android
          - ios
        default: both

permissions:
  contents: read

jobs:
  build-package:
    name: Build Unity package for manual E2E
    runs-on: macos-14
    outputs:
      artifact_name: ${{ steps.resolve.outputs.artifact_name }}
      regular_package: ${{ steps.resolve.outputs.regular_package }}
      version_label: ${{ steps.resolve.outputs.version_label }}
      ref: ${{ steps.resolve.outputs.ref }}

    steps:
      - name: Resolve version, package names, and ref
        id: resolve
        run: |
          if [[ -n "${{ inputs.release_tag }}" ]]; then
            VERSION="${{ inputs.release_tag }}"
            VERSION="${VERSION#v}"
          else
            VERSION="${{ inputs.plugin_version || 'manual-test' }}"
          fi
          REF="${{ github.ref_name }}"
          echo "version_label=$VERSION" >> "$GITHUB_OUTPUT"
          echo "artifact_name=unity-packages-$VERSION" >> "$GITHUB_OUTPUT"
          echo "regular_package=appsflyer-unity-plugin-$VERSION.unitypackage" >> "$GITHUB_OUTPUT"
          echo "ref=$REF" >> "$GITHUB_OUTPUT"

      - name: Checkout ref
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.resolve.outputs.ref }}

      # ── Download from GitHub release (when release_tag is provided) ──────────

      - name: Download from GitHub release
        if: inputs.release_tag != ''
        run: |
          mkdir -p dist/unitypackages
          gh release download "${{ inputs.release_tag }}" \
            --repo AppsFlyerSDK/appsflyer-unity-plugin \
            --pattern "appsflyer-unity-plugin-${{ steps.resolve.outputs.version_label }}.unitypackage" \
            --dir dist/unitypackages
          echo "Downloaded:"
          ls dist/unitypackages/
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Bundle AppsFlyerDependencies.xml from release tag
        if: inputs.release_tag != ''
        run: |
          git fetch origin "refs/tags/${{ inputs.release_tag }}" --depth=1
          git show FETCH_HEAD:Editor/AppsFlyerDependencies.xml \
            > dist/unitypackages/AppsFlyerDependencies.xml
          echo "Bundled AppsFlyerDependencies.xml:"
          cat dist/unitypackages/AppsFlyerDependencies.xml

      # ── Build from source (when release_tag is not provided) ────────────────

      - name: Cache Unity Editor installation
        if: inputs.release_tag == ''
        id: cache-unity
        uses: actions/cache@v4
        with:
          path: /Applications/Unity/Unity.app
          key: unity-6000.3.5f1-core-macos14-arm64

      - name: Install Unity Editor
        if: inputs.release_tag == '' && steps.cache-unity.outputs.cache-hit != 'true'
        run: |
          curl -fL "https://download.unity3d.com/download_unity/a1ec4b2f2d19/MacEditorInstallerArm64/Unity-6000.3.5f1.pkg" \
            -o /tmp/Unity.pkg
          sudo installer -pkg /tmp/Unity.pkg -target /
          UNITY=$(find /Applications -name "Unity" -type f -path "*/MacOS/Unity" 2>/dev/null | head -1)
          echo "UNITY_PATH=$UNITY" >> "$GITHUB_ENV"
        timeout-minutes: 45

      - name: Activate Unity license
        if: inputs.release_tag == ''
        run: |
          UNITY="${UNITY_PATH:-/Applications/Unity/Unity.app/Contents/MacOS/Unity}"
          "$UNITY" -quit -batchmode \
            -serial "${{ secrets.UNITY_SERIAL }}" \
            -username "${{ secrets.UNITY_EMAIL }}" \
            -password "${{ secrets.UNITY_PASSWORD }}" \
            -logFile /tmp/unity-activate.log 2>&1 || true
          grep -E "LICENSE|license|error|Error" /tmp/unity-activate.log || true

      - name: Build regular package
        if: inputs.release_tag == ''
        run: |
          deploy/build_unity_package.sh \
            --version "${{ steps.resolve.outputs.version_label }}" \
            --output-dir dist/unitypackages
        timeout-minutes: 30

      - name: Return Unity license
        if: always() && inputs.release_tag == ''
        run: |
          UNITY="${UNITY_PATH:-/Applications/Unity/Unity.app/Contents/MacOS/Unity}"
          "$UNITY" -quit -batchmode -returnlicense \
            -username "${{ secrets.UNITY_EMAIL }}" \
            -password "${{ secrets.UNITY_PASSWORD }}" \
            -logFile /tmp/unity-return.log 2>&1 || true
          cat /tmp/unity-return.log || true

      # ── Upload artifact (always) ─────────────────────────────────────────────

      - name: Upload Unity package artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.resolve.outputs.artifact_name }}
          path: dist/unitypackages/
          retention-days: 7

  e2e-ios:
    if: ${{ inputs.platform == 'both' || inputs.platform == 'ios' }}
    needs: build-package
    uses: ./.github/workflows/rc-e2e-ios.yml
    with:
      plugin_version: ${{ needs.build-package.outputs.version_label }}
      release_branch: ${{ needs.build-package.outputs.ref }}
      package_artifact_name: ${{ needs.build-package.outputs.artifact_name }}
      package_file_name: ${{ needs.build-package.outputs.regular_package }}
    secrets: inherit

  e2e-android:
    if: ${{ always() && needs.build-package.result == 'success' && (inputs.platform == 'android' || (inputs.platform == 'both' && needs.e2e-ios.result == 'success')) }}
    needs: [build-package, e2e-ios]
    permissions:
      contents: read
      packages: read
    uses: ./.github/workflows/rc-e2e-android.yml
    with:
      plugin_version: ${{ needs.build-package.outputs.version_label }}
      release_branch: ${{ needs.build-package.outputs.ref }}
      package_artifact_name: ${{ needs.build-package.outputs.artifact_name }}
      package_file_name: ${{ needs.build-package.outputs.regular_package }}
    secrets: inherit
